<body class="body">
    <div class="content-wrapper">
        <div class="survey-container">
            <!-- SURVEY LAYOUT WILL BE INJECTED HERE FROM JAVASCRIPT BASED ON YOUR "survey.js" FILE -->
        </div>
    </div>

    <div class="progress">
        <div class="bar"></div>
    </div>

    <div class="video-wrapper">
        <video autoplay muted playsinline loop class="video">
            <source src="" type="video/mp4" />
        </video>
    </div>

    <!-- THIS ELEMENT IS USED AS TEMPLATE FOR SURVEY STEPS  -->
    <template id="step">
        <div class="step current">
            <div class="step__inner">
                <div class="step__header">
                    <h1 class="step__title">Title</h1>
                </div>
                <div class="step__body">
                    <p class="step__question">Question</p>
                </div>
                <div class="step__footer">
                    <div class="step__answers">
                        <!-- ANSWERS -->
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- THIS ELEMENT IS USED AS TEMPLATE FOR SURVEY LEFT ANSWERS  -->
    <template id="step-answer-left">
        <a class="btn btn--accent btn--round" href="#">
            Answer
        </a>
    </template>

    <!-- THIS ELEMENT IS USED AS TEMPLATE FOR SURVEY RIGHT ANSWERS  -->
    <template id="step-answer-right">
        <a class="btn btn--primary btn--round" href="#">
            Answer
        </a>
    </template>

    <!-- THIS ELEMENT IS USED AS TEMPLATE FOR SURVEY SINGLE ANSWER  -->
    <template id="step-answer-single">
        <div class="step__answers step__answers--single">
            <a class="btn btn--primary" href="#">
                Answer
            </a>
        </div>
    </template>
